<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой сайт</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
        }

        .bg {
            position: absolute;
            width: 100%;
            height: 100vh;
            object-fit: cover;
            filter: blur(20px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.6);
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }

        .btn {
            margin-top: 20px;
            padding: 15px 25px;
            background: #0088cc;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .btn:hover {
            background: #00aaff;
        }
    </style>
</head>
<body>

    <img src="image.jpg" class="bg">

    <div class="overlay"></div>

    <div class="center">
        <h1>🔞 Контент 18+</h1>
        <p>Нажми, чтобы продолжить</p>

        <button class="btn" onclick="goTelegram()">
            Открыть Telegram
        </button>
    </div>

    <script>
        function goTelegram() {
            window.location.href = "https://t.me/The_best_20_05";
        }
    </script>

</body>
</html>
